<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Khmer Voice-to-Text (Local Whisper)</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #090d16;
            color: #f1f5f9;
            max-width: 600px;
            margin: 40px auto;
            padding: 20px;
        }
        .card {
            background: #111827;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5);
            border: 1px solid #1f2937;
        }
        h2 {
            margin-top: 0;
            color: #f59e0b;
            text-align: center;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #9ca3af;
        }
        input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #374151;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
            background-color: #030712;
            color: #fff;
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background-color: #f59e0b;
            color: #090d16;
            transition: background 0.2s;
            margin-top: 10px;
        }
        button:hover { background-color: #d97706; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #status {
            text-align: center;
            font-weight: 600;
            color: #fbbf24;
            margin-bottom: 15px;
            min-height: 20px;
            margin-top: 15px;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 12px;
            border: 1px solid #374151;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
            resize: vertical;
            background-color: #030712;
            color: #fff;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Khmer Voice-to-Text (Local Whisper)</h2>

    <div class="form-group">
        <label for="audioFile">Select Audio File (.m4a, .mp3, .wav, .ogg, .flac)</label>
        <input type="file" id="audioFile" accept="audio/*">
    </div>

    <button id="transcribeBtn">Transcribe</button>

    <div id="status">Ready</div>

    <div class="form-group">
        <label for="output">Transcribed Text (Khmer)</label>
        <textarea id="output" readonly placeholder="Transcription will appear here..."></textarea>
    </div>
</div>

<script>
    const btn = document.getElementById('transcribeBtn');
    const statusDiv = document.getElementById('status');
    const outputArea = document.getElementById('output');
    const fileInput = document.getElementById('audioFile');

    btn.addEventListener('click', async () => {
        const file = fileInput.files[0];

        if (!file) {
            statusDiv.textContent = "Please select an audio file first.";
            statusDiv.style.color = "#fbbf24";
            return;
        }

        btn.disabled = true;
        statusDiv.textContent = "Transcribing...";
        statusDiv.style.color = "#60a5fa";
        outputArea.value = "";

        const formData = new FormData();
        formData.append('audio', file, file.name);

        try {
            const res = await fetch('/transcribe', { method: 'POST', body: formData });
            const data = await res.json();

            if (res.ok) {
                statusDiv.textContent = "Done";
                statusDiv.style.color = "#34d399";
                outputArea.value = data.text;
            } else {
                statusDiv.textContent = data.error || "Transcription failed";
                statusDiv.style.color = "#f87171";
            }
        } catch (err) {
            statusDiv.textContent = "Could not reach the server. Is Flask running on port 5000?";
            statusDiv.style.color = "#f87171";
            console.error(err);
        } finally {
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
